<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Nechronica Character Builder</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		
		
		<!--bootstrap via file-->
		<!--<link rel="stylesheet" href="bootstrap-4.6.1-dist/css/bootstrap.css">-->
		<!--<script src="js/jquery-3.6.0.js"></script>-->
		
		<!--bootstrap via CDN-->
		
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
		<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
		
		<!--Icons-->
		<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css" 
		integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">

		
		<!--JSONP scripts-->
		<script src="json/dollPremonitionsJSON.js"></script>
		<script src="json/dollMemoriesJSON.js"></script>
		<script src="json/dollPositionsJSON.js"></script>
		<script src="json/dollClassesJSON.js"></script>
		<script src="json/dollSkillsJSON.js"></script>
		<script src="json/dollPartsJSON.js"></script>
		<script src="json/dollTreasuresJSON.js"></script>
		<script src="json/randomNamesJSON.js"></script>
		
		
		<!--custom style and scripts-->
		<link rel="stylesheet" href="css/nechronica-stylesheet.css">
		<script src="js/CharacterList.js"></script>
		<script src="js/cookieDataManager.js"></script>
		<script src="js/DataTemplates.js"></script>
		<script src="js/CharacterCreation.js"></script>
		<script src="js/CharacterSheet.js"></script>

		<!--other scripts-->
		<script>
			
		</script>
		
		
		
	</head>
	<body onload="loadCharacterList();">
		<div class="container" id="mainContainer" >
			
		</div>
		
		
		<!-- Modals -->
		<!-- Memory Fragment picker-->
		<div class="modal" id="memory-picker">
		  <div class="modal-dialog modal-xl">
			<div class="modal-content">

			  <!-- Modal Header -->
			  <div class="modal-header">
				<h4 class="modal-title">Fragments of Memory</h4>
				<button type="button" class="close" data-dismiss="modal">&times;</button>
			  </div>

			  <!-- Modal body -->
			  <div class="modal-body" id="memory-list">
				Modal body..
			  </div>

			  <!-- Modal footer -->
			  <div class="modal-footer">
				<button type="button" class="btn btn-danger" data-dismiss="modal">Close</button>
			  </div>

			</div>
		  </div>
		</div>
		<!-- Premonition picker-->
		<div class="modal" id="premonition-picker">
		  <div class="modal-dialog modal-xl">
			<div class="modal-content">

			  <!-- Modal Header -->
			  <div class="modal-header">
				<h4 class="modal-title">Premonitions</h4>
				<button type="button" class="close" data-dismiss="modal">&times;</button>
			  </div>

			  <!-- Modal body -->
			  <div class="modal-body" id="premonition-list">
				Modal body..
			  </div>

			  <!-- Modal footer -->
			  <div class="modal-footer">
				<button type="button" class="btn btn-danger" data-dismiss="modal">Close</button>
			  </div>

			</div>
		  </div>
		</div>
		<!--part position picker-->
		<div class="modal" id="part-location-picker">
		  <div class="modal-dialog">
			<div class="modal-content">

				  <!-- Modal Header -->
				  <div class="modal-header">
					<h4 class="modal-title">Set Part Location</h4>
					<button type="button" class="close" data-dismiss="modal">&times;</button>
				  </div>

				  <!-- Modal body -->
				  <div class="modal-body d-flex justify-content-center">
					<button type="button" id="set-loc-head" data-dismiss="modal" onclick="placePart('Head')"
					class="btn btn-dark rounded text-outline tile-64 bg-img-head m-2">Head</button>
					<button type="button" id="set-loc-head" data-dismiss="modal" onclick="placePart('Arms')"
					class="btn btn-dark rounded text-outline tile-64 bg-img-arms m-2">Arms</button>
					<button type="button" id="set-loc-head" data-dismiss="modal" onclick="placePart('Torso')"
					class="btn btn-dark rounded text-outline tile-64 bg-img-torso m-2">Torso</button>
					<button type="button" id="set-loc-head" data-dismiss="modal" onclick="placePart('Legs')"
					class="btn btn-dark rounded text-outline tile-64 bg-img-legs m-2">Legs</button>
				  </div>

				  <!-- Modal footer -->
				  <div class="modal-footer">
					<button type="button" id="set-loc-remove" class="btn btn-danger" 
					data-dismiss="modal" onclick="placePart('')">Remove</button>
					<button type="button" class="btn btn-danger" data-dismiss="modal">Cancel</button>
				  </div>

			</div>
		  </div>
		</div>
		<!--Treasure picker-->
		<div class="modal" id="treasure-picker">
		  <div class="modal-dialog modal-lg">
			<div class="modal-content">

				  <!-- Modal Header -->
				  <div class="modal-header">
					<h4 class="modal-title">Select Treasure</h4>
					<button type="button" class="close" data-dismiss="modal">&times;</button>
				  </div>

				  <!-- Modal body -->
				  <div class="modal-body">

				  </div>

				  <!-- Modal footer -->
				  <div class="modal-footer">
					<button type="button" class="btn btn-danger" data-dismiss="modal">Cancel</button>
				  </div>

			</div>
		  </div>
		</div>
	</body>
</html>
